<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-commerce - Nhóm Kiểm Thử</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">🛒 MiniShop API</a>
            <div class="d-flex align-items-center">
                <span id="userInfo" class="text-white me-3 d-none">Chào, User!</span>
                <button id="btnLogin" class="btn btn-outline-light me-2" data-bs-toggle="modal" data-bs-target="#loginModal">Đăng nhập</button>
                <button id="btnLogout" class="btn btn-danger d-none" onclick="logout()">Đăng xuất</button>
                <button class="btn btn-warning ms-2" data-bs-toggle="modal" data-bs-target="#cartModal">
                    Giỏ hàng (<span id="cartCount">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-8">
                <input type="text" id="searchInput" class="form-control" placeholder="Tìm kiếm sản phẩm..." onkeyup="filterProducts()">
            </div>
            <div class="col-md-4">
                <button class="btn btn-primary w-100" onclick="filterProducts()">Tìm kiếm</button>
            </div>
        </div>

        <div id="loadingIndicator" class="loading">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Đang tải dữ liệu từ API...</p>
        </div>

        <div class="row" id="productList"></div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Đăng nhập (Dùng API)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-info">
                        <strong>Tài khoản test API:</strong><br>
                        Username: <code>mor_2314</code><br>
                        Password: <code>83r5^_</code>
                    </div>
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label>Tên đăng nhập (Username)</label>
                            <input type="text" id="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Mật khẩu</label>
                            <input type="password" id="password" class="form-control" required>
                            <small class="text-danger d-none" id="loginError">Sai tài khoản hoặc lỗi API!</small>
                        </div>
                        <button type="submit" id="btnSubmitLogin" class="btn btn-success w-100">Đăng nhập</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Giỏ hàng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Sản phẩm</th>
                                <th>Giá</th>
                                <th>Số lượng</th>
                                <th>Tổng</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="cartItems"></tbody>
                    </table>
                    <h4 class="text-end">Tổng tiền: <span id="totalPrice">0</span> VNĐ</h4>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" onclick="checkout()">Thanh toán ngay</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/main.js"></script>
</body>
</html>
